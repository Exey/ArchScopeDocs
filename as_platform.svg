  <defs>
    <style>
      text { font-family: Tahoma, 'Segoe UI', 'Helvetica Neue', sans-serif; }
    </style>
  </defs>
  <!-- Outer frame -->
  <rect width="1100" height="540" rx="8" fill="#141925" stroke="#222b3a" stroke-width="1"/>

  <!-- Platform tabs -->
  <!-- Go tab (active) -->
  <rect x="32" y="16" width="200" height="36" rx="8" fill="#1b2230" stroke="#222b3a" stroke-width="1"/>
