  <!-- Title bar -->
  <text x="32" y="38" font-size="20" font-weight="bold" fill="#e6edf6">🛡️ Danger Index</text>
  <text x="32" y="57" font-size="13" fill="#9aa7ba">130+ rules · 14 weighted categories · score 0–1000 (0 = hardened, 1000 = critical)</text>
  <line x1="32" y1="68" x2="1068" y2="68" stroke="#222b3a" stroke-width="1"/>

  <!-- ══ LEFT GAUGE PANEL: x=32 y=76 w=240 h=400 ══ -->
  <rect x="32" y="76" width="240" height="400" rx="8" fill="#1b2230" stroke="#222b3a" stroke-width="1"/>

  <!--
    Arc gauge: cx=152, cy=228, r=88
    Left endpoint  = (cx-r, cy) = (64, 228)
    Right endpoint = (cx+r, cy) = (240, 228)
    Distance = 2r = 176 → exact semicircle, no degenerate arc

    Background arc: M 64 228 A 88 88 0 0 1 240 228
      sweep=1 (clockwise in SVG = goes UP from left to right) → top half ✓

    Score arc endpoint for 23/1000:
      endAngle = π × (1 − 23/1000) = π × 0.977 = 3.0693 rad
      ex = 152 + 88 × cos(3.0693) = 152 + 88×(−0.9973) = 152 − 87.76 ≈ 64.2
      ey = 228 − 88 × sin(3.0693) = 228 − 88×0.0725 = 228 − 6.4 ≈ 221.6
      (minus because SVG y increases downward)
  -->

  <!-- Arc track (empty) -->
  <path d="M 64 228 A 88 88 0 0 1 240 228"
        fill="none" stroke="#2a3550" stroke-width="18" stroke-linecap="round"/>

  <!-- Arc fill: 23/1000 = 2.3% — tiny green sliver at left end with visible rounded cap -->
  <path d="M 64 228 A 88 88 0 0 1 64.2 221.6"
        fill="none" stroke="#3fb950" stroke-width="18" stroke-linecap="round"/>

