<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="490" viewBox="0 0 1100 490">
  <defs>
    <style>text { font-family: Tahoma, 'Segoe UI', 'Helvetica Neue', sans-serif; }</style>
  </defs>

  <!-- Outer frame -->
